<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ملتقى القرآن - تسجيل الدخول</title>
    <link rel="stylesheet" href="assests/css/variables.css">
    <link rel="stylesheet" href="assests/css/reset.css">
    <link rel="stylesheet" href="assests/css/global.css">
    <link rel="stylesheet" href="assests/css/login.css">
</head>
<body>
    <main class="login-page" aria-label="صفحة تسجيل الدخول">
        <!--right panel-->
        <section class="visual-panel" aria-hidden="true">
            <div class="visual-overlay"></div>
            <blockquote class="verse-text">
                قال تعالى
                <br>
               <span style="font-size:20px"> { ثُمَّ أَوْرَثْنَا الْكِتَابَ الَّذِينَ اصْطَفَيْنَا مِنْ عِبَادِنَا}</span>


            </blockquote>
        </section>

<!--        Left panel-->
        <section class="form-panel">
            <article class="login-card card" aria-labelledby="portal-title">
                <div class="icon-badge" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" aria-label="أيقونة كتاب">
                        <path d="M4 6.5C4 5.12 5.12 4 6.5 4H19v14H6.5A2.5 2.5 0 0 0 4 20.5V6.5Zm2.5-1A1 1 0 0 0 5.5 6.5v11.1c.31-.1.65-.15 1-.15H17.5V5.5H6.5Zm1 3h8v1.5h-8V8.5Zm0 3h8v1.5h-8v-1.5Z"/>
                    </svg>
                </div>

                <header class="card-header">
                    <h1 id="portal-title">بوابة ملتقى القرآن</h1>
                    <p>كلما ازددت علمًا بالقرآن، ازددت خشية</p>
                </header>

                <form class="login-form" action="#" method="post" novalidate>
                    <div class="field-group">
                        <label for="user-id">رقم المستخدم</label>
                        <input id="user-id" name="userId" type="text" inputmode="numeric" autocomplete="username" placeholder="أدخل رقم المستخدم">
                    </div>

                    <div class="field-group">
                        <label for="password">كلمة المرور</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="أدخل كلمة المرور">
                    </div>

                    <button type="submit" class="btn-primary">تسجيل الدخول</button>
                </form>

                <div class="card-footer" aria-hidden="true">
                    <hr>
                    <span class="gold-line"></span>
                </div>
            </article>
        </section>
    </main>

<script src="assests/js/main.js"></script>
</body>
</html>
